name: Test on MySQL

on: [ push ]

env:
    DB_DATABASE: adminyard_test
    DB_USER: root
    DB_PASSWORD: root
    APP_DB_TYPE: mysql

permissions:
    contents: read

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                operating_system: ['ubuntu-22.04']
                mysql_versions:
                    - 'mariadb-10.2'
                    - 'mariadb-10.3'
                    - 'mariadb-10.4'
                    - 'mariadb-10.5'
                    - 'mariadb-10.6'
                    - 'mariadb-10.7'
                    - 'mariadb-10.8'
                    - 'mariadb-10.9'
                    - 'mariadb-10.10'
                    - 'mariadb-10.11'
                    - 'mariadb-11.0'
                    - 'mariadb-11.1'
                    - 'mariadb-11.2'
                    - 'mariadb-11.3'
                    - 'mariadb-11.4'
                    - 'mariadb-11.5'
                    - 'mariadb-11.6'
                    - 'mariadb-11.7'
                    - 'mariadb-11.8'
                    - 'mariadb-12.0'
                    - 'mariadb-12.1'
                    - '5.6'
                    - '5.7'
                    - '8.0'
                    - '8.1'
                    - '8.2'
                    - '8.3'
                    - '8.4'
                    - '9.0'
                    - '9.1'
                    - '9.2'
                    - '9.3'
                    - '9.4'
                    - '9.5'
                php_versions:
                    - '8.4'
                include:
                    -
                        operating_system: 'ubuntu-22.04'
                        mysql_versions: 'mariadb-11.8'
                        php_versions: '8.2'
                    -
                        operating_system: 'ubuntu-22.04'
                        mysql_versions: 'mariadb-11.8'
                        php_versions: '8.3'
                    -
                        operating_system: 'ubuntu-22.04'
                        mysql_versions: 'mariadb-11.8'
                        php_versions: '8.5'

        runs-on: '${{ matrix.operating_system }}'

        steps:
            -   uses: actions/checkout@v4

            -   uses: shogo82148/actions-setup-mysql@v1
                with:
                    mysql-version: ${{ matrix.mysql_versions }}
                    root-password: ${{ env.DB_PASSWORD }}

            -   name: 'Setup MySQL'
                run: |
                    mysql -e 'SELECT version();' -u${{ env.DB_USER }} -h127.0.0.1 -p${{ env.DB_PASSWORD }}
                    mysql -e 'CREATE DATABASE ${{ env.DB_DATABASE }};' -u${{ env.DB_USER }} -h127.0.0.1 -p${{ env.DB_PASSWORD }}

            -   name: 'Setup PHP'
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php_versions }}

            -   name: Validate composer.json and composer.lock
                run: composer validate --strict

            -   name: Cache Composer packages
                id: composer-cache
                uses: actions/cache@v3
                with:
                    path: vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-php-

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress

            -   name: Run test cases
                run: php -d register_argc_argv=On vendor/bin/codecept run
